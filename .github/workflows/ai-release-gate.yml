name: AI Release Gate

on:
  workflow_dispatch:
    inputs:
      contract_file:
        description: "Contract file to evaluate"
        required: true
        default: "contracts/safe_release_contract.json"
        type: string

  pull_request:
    branches:
      - main

jobs:
  ai-release-gate:
    name: Run AI Release Gate
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      INPUT_BUCKET_NAME: ${{ vars.INPUT_BUCKET_NAME }}
      RESULTS_TABLE_NAME: ${{ vars.RESULTS_TABLE_NAME }}
      CONTRACT_FILE: ${{ github.event.inputs.contract_file || 'contracts/safe_release_contract.json' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AI_RELEASE_GATE_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AI_RELEASE_GATE_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3

      - name: Validate contract JSON
        run: |
          python -m json.tool "$CONTRACT_FILE" > /dev/null

      - name: Run AI Release Gate
        run: |
          python scripts/run_release_gate_ci.py "$CONTRACT_FILE"
